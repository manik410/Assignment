
<app-navbar></app-navbar>
<hr/>
<div class="container">
  <div class="row">
    <div class="col-md-8"></div>
    <div class="col-md-4">
      <button (click)="addData()" class="btn btn-primary" style="color:black;width:170px;border-radius: 0px;background-color: rgb(70,157,237);">Add</button>
      <button (click)="deleteData()" class="btn btn-primary" style="width:170px;margin:10px;color:black;border-radius: 0px;background-color: rgb(70,157,237);">Delete</button>
    </div>
  </div>
  <div class="row">
    <div class="col-md-2"></div>
    <div class="col-md-10">
  <table *ngIf="schools!=null" style="text-align:center;" class="table table-bordered ">
      <thead style="text-align: center;font-weight: bold;">
          <tr>
              <td>School Name</td>
              <td>Board</td>
              <td>Medium</td>
              <td>Class</td>
              <td>Action</td>
          </tr>
          <tr>
            <td><input type="search"></td>
            <td><input type="search"></td>
            <td><input type="search"></td>
            <td><input type="search"></td>
            <td></td>
          </tr>
      </thead>
      <tbody>
          <tr *ngFor="let item of schools">
              <td>
                <input type="checkbox" name={{item.id}} (change)="checkCheckBoxvalue(item)">
                {{ item.schoolname}}
              </td>
              <td>{{ item.board}}</td>
              <td>{{ item.medium}}</td>
              <td>{{item.class}}</td>
              <td>
                <button type="button" >Edit</button>
              </td>
          </tr>
      </tbody>
  </table>
</div>
</div>
</div>
